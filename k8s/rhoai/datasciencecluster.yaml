---
# DataScienceCluster — CPU profile (no GPU, no KServe Serverless).
#
# KServe serving is set to Removed so Service Mesh and Serverless
# operators are NOT required. Dashboard and workbenches are enabled —
# the minimal set needed for the RHOAI dashboard alongside Ollama CPU inference.
apiVersion: datasciencecluster.opendatahub.io/v1
kind: DataScienceCluster
metadata:
  name: default-dsc
  labels:
    app.kubernetes.io/created-by: rhods-operator
    app.kubernetes.io/instance: default-dsc
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: datasciencecluster
    app.kubernetes.io/part-of: rhods-operator
spec:
  components:
    codeflare:
      managementState: Removed
    dashboard:
      managementState: Managed
    datasciencepipelines:
      managementState: Managed
    feastoperator: {}
    kserve:
      managementState: Managed
      nim:
        managementState: Removed
      rawDeploymentServiceConfig: Headless
      serving:
        managementState: Removed   # no Knative Serving — Service Mesh not required
        name: knative-serving
    kueue:
      managementState: Removed
    llamastackoperator: {}
    modelmeshserving:
      managementState: Removed
    modelregistry:
      managementState: Removed
      registriesNamespace: rhoai-model-registries
    ray:
      managementState: Removed
    trainingoperator: {}
    trustyai:
      eval:
        lmeval:
          permitCodeExecution: deny
          permitOnline: deny
      managementState: Removed
    workbenches:
      managementState: Managed
      workbenchNamespace: rhods-notebooks
