---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: developer-hub-instance
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/Babas10/developer-hub-env
    targetRevision: main
    path: k8s/developer-hub/instance
  destination:
    server: https://kubernetes.default.svc
    namespace: developer-hub
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 15
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 15m
