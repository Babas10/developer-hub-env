---
# Ollama CPU LLM server — deployed after RHOAI operator is ready (wave 5).
# Provides an OpenAI-compatible API at http://ollama.ai-agentic.svc:11434
# used by the RHDH Lightspeed plugin.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ollama
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/Babas10/developer-hub-env
    targetRevision: main
    path: k8s/ollama
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-agentic
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
