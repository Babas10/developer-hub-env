---
# Lightspeed provider configuration — injected into lightspeed-core container by the RHDH operator.
# Only define variables for providers you want to ENABLE.
# WARNING: defining ENABLE_* as empty string still counts as "defined" and may activate the provider.
# Points to the Ollama CPU deployment in the ai-agentic namespace.
apiVersion: v1
kind: Secret
metadata:
  name: llama-stack-secrets
  namespace: developer-hub
type: Opaque
stringData:
  ENABLE_OLLAMA: "true"
  OLLAMA_URL: "http://ollama.ai-agentic.svc:11434"
