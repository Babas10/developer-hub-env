---
# llama-stack sidecar configuration — injected via envFrom in deployment.patch.
# Only define ENABLE_* variables for providers you want active (empty string counts as defined).
# Points to the Ollama CPU deployment in the ai-agentic namespace.
apiVersion: v1
kind: Secret
metadata:
  name: llama-stack-secrets
  namespace: developer-hub
type: Opaque
stringData:
  ENABLE_OLLAMA: "true"
  OLLAMA_URL: "http://ollama.ai-agentic.svc:11434/v1"
