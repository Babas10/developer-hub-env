---
# llama-stack sidecar configuration — Ollama provider (non-sensitive values).
# Points to the Ollama CPU deployment in ai-agentic namespace.
# No API key required for Ollama.
apiVersion: v1
kind: Secret
metadata:
  name: llama-stack-secrets
  namespace: developer-hub
type: Opaque
stringData:
  ENABLE_VLLM: ""
  ENABLE_OPENAI: ""
  ENABLE_VERTEX_AI: ""
  ENABLE_OLLAMA: "true"
  OLLAMA_URL: "http://ollama.ai-agentic.svc:11434"
  VLLM_URL: ""
  VLLM_API_KEY: ""
  VLLM_MAX_TOKENS: ""
  VLLM_TLS_VERIFY: ""
  OPENAI_API_KEY: ""
  VERTEX_AI_PROJECT: ""
  VERTEX_AI_LOCATION: ""
  GOOGLE_APPLICATION_CREDENTIALS: ""
  SAFETY_MODEL: ""
  SAFETY_URL: ""
  SAFETY_API_KEY: ""
