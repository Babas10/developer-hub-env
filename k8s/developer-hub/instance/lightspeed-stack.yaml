---
# Lightspeed Core Service (LCS) configuration — mounted into lightspeed-core via extraFiles.
# LLM provider (Ollama) is configured via llama-stack-secrets env vars injected by the operator.
apiVersion: v1
kind: ConfigMap
metadata:
  name: lightspeed-stack
  namespace: developer-hub
data:
  lightspeed-stack.yaml: |
    name: Lightspeed Core Service (LCS)
    service:
      host: 0.0.0.0
      auth_enabled: false
      workers: 1
      color_log: true
      access_log: true
    llama_stack:
      use_as_library_client: true
    user_data_collection:
      feedback_enabled: false
      transcripts_enabled: false
    authentication:
      module: "noop"
    conversation_cache:
      type: "sqlite"
      sqlite:
        db_path: "/tmp/lcs_cache.db"
