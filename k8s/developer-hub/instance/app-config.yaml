---
# Developer Hub application configuration.
# Mounted by the Backstage CR as an appConfig ConfigMap.
# Secret values are injected at runtime from the backstage-secrets Secret
# (sealed in backstage-secrets-sealed.yaml).
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-rhdh
  namespace: developer-hub
data:
  app-config.yaml: |
    app:
      title: Red Hat Developer Hub
      # Route URL is auto-provisioned by the RHDH operator.
      # The operator injects the correct baseUrl automatically.

    backend:
      auth:
        externalAccess:
          - type: legacy
            options:
              subject: legacy-default-config
              secret: "${BACKEND_SECRET}"

    # GitHub integration — token injected from backstage-secrets Secret
    integrations:
      github:
        - host: github.com
          token: "${GITHUB_TOKEN}"

    # Authentication — GitHub OAuth
    # Client ID and Secret injected from backstage-secrets Secret
    auth:
      environment: production
      providers:
        github:
          production:
            clientId: "${GITHUB_CLIENT_ID}"
            clientSecret: "${GITHUB_CLIENT_SECRET}"

    # Software catalog
    catalog:
      rules:
        - allow: [Component, System, API, Group, User, Resource, Location, Template]

    # Kubernetes plugin — uses in-cluster service account
    kubernetes:
      serviceLocatorMethod:
        type: multiTenant
      clusterLocatorMethods:
        - type: config
          clusters:
            - url: https://kubernetes.default.svc
              name: local
              authProvider: serviceAccount
              skipTLSVerify: true
              skipMetricsLookup: true
