---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-rhdh
  namespace: developer-hub
data:
  app-config.yaml: |
    app:
      title: Red Hat Developer Hub

    backend:
      auth:
        externalAccess:
          - type: legacy
            options:
              subject: legacy-default-config
              secret: "${BACKEND_SECRET}"

    signInPage: oidc

    auth:
      environment: production
      session:
        secret: "${SESSION_SECRET}"
      providers:
        oidc:
          production:
            metadataUrl: "${KEYCLOAK_BASE_URL}/.well-known/openid-configuration"
            clientId: "${KEYCLOAK_CLIENT_ID}"
            clientSecret: "${KEYCLOAK_CLIENT_SECRET}"
            prompt: auto
            signIn:
              resolvers:
                - resolver: preferredUsernameMatchingUserEntityName
                - resolver: emailMatchingUserEntityProfileEmail

    argocd:
      appLocatorMethods:
        - type: 'config'
          instances:
            - name: default
              url: "${ARGOCD_INSTANCE_URL}"
              token: "${ARGOCD_AUTH_TOKEN}"

    kubernetes:
      serviceLocatorMethod:
        type: multiTenant
      clusterLocatorMethods:
        - type: config
          clusters:
            - name: "${K8S_CLUSTER_NAME}"
              url: "${K8S_CLUSTER_URL}"
              authProvider: serviceAccount
              skipTLSVerify: true
              serviceAccountToken: "${K8S_SERVICE_ACCOUNT_TOKEN}"

    catalog:
      providers:
        keycloakOrg:
          default:
            # Internal K8s service URL — server-to-server, always the same across clusters.
            baseUrl: "http://rhdh-keycloak-service.keycloak.svc.cluster.local:8080"
            loginRealm: rhdh
            realm: rhdh
            clientId: "${KEYCLOAK_CLIENT_ID}"
            clientSecret: "${KEYCLOAK_CLIENT_SECRET}"
            schedule:
              frequency: { minutes: 30 }
              timeout: { minutes: 3 }
              initialDelay: { seconds: 30 }

