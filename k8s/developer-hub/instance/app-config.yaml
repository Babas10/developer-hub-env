---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-rhdh
  namespace: developer-hub
data:
  app-config.yaml: |
    app:
      title: Red Hat Developer Hub

    backend:
      auth:
        externalAccess:
          - type: legacy
            options:
              subject: legacy-default-config
              secret: "${BACKEND_SECRET}"

    auth:
      environment: production
      session:
        secret: "${SESSION_SECRET}"
      providers:
        oidc:
          production:
            # KEYCLOAK_BASE_URL is injected at post-install time into backstage-cluster-config secret.
            # Format: https://<keycloak-route>/realms/rhdh
            metadataUrl: "${KEYCLOAK_BASE_URL}/.well-known/openid-configuration"
            clientId: "${KEYCLOAK_CLIENT_ID}"
            clientSecret: "${KEYCLOAK_CLIENT_SECRET}"
            prompt: auto
            signInPage: oidc
            signIn:
              resolvers:
                - resolver: preferredUsernameMatchingUserEntityName
                - resolver: emailMatchingUserEntityProfileEmail

