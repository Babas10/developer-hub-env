---
# Lightspeed plugin app-config — mounted as a second app-config by the Backstage CR.
# The lightspeed: block here replaces the one previously in app-config-rhdh.
apiVersion: v1
kind: ConfigMap
metadata:
  name: lightspeed-app-config
  namespace: developer-hub
data:
  app-config.yaml: |
    backend:
      csp:
        upgrade-insecure-requests: false
      img-src:
        - "'self'"
        - "data:"
        - https://avatars.githubusercontent.com
        - https://secure.gravatar.com

    lightspeed:
      prompts:
        - title: Getting Started with Red Hat Developer Hub
          message: Can you guide me through the first steps to start using RHDH as a developer, like exploring the Software Catalog and adding my service?
        - title: Understanding GitOps with ArgoCD
          message: How does the App of Apps pattern work in ArgoCD and how is it used in this setup?
        - title: Tekton Pipelines
          message: How do I create a Tekton pipeline and visualize it in Developer Hub?
