---
# Dynamic plugins configuration for Red Hat Developer Hub.
# Uses the default plugin set bundled with the RHDH image.
# Specific plugins will be enabled here once correct package references
# are confirmed for this RHDH version.
apiVersion: v1
kind: ConfigMap
metadata:
  name: dynamic-plugins-rhdh
  namespace: developer-hub
data:
  dynamic-plugins.yaml: |
    includes:
      - dynamic-plugins.default.yaml
    plugins:
      # ── Keycloak catalog sync ──────────────────────────────────────────────
      - package: ./dynamic-plugins/dist/backstage-community-plugin-catalog-backend-module-keycloak-dynamic
        disabled: false

      # ── Kubernetes (required by Tekton) ───────────────────────────────────
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes-backend-dynamic
        disabled: false

      # ── ArgoCD ────────────────────────────────────────────────────────────
      # Backend: community plugin (handles ArgoCD API calls)
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-argocd-backend:bs_1.49.4__1.4.0
        disabled: false
      # Frontend: Roadie plugin (built for RHDH entity page system)
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/roadiehq-backstage-plugin-argo-cd:bs_1.49.4__2.12.5
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              roadiehq.backstage-plugin-argo-cd:
                entityTabs:
                  - path: /argo-cd
                    title: ArgoCD
                    mountPoint: entity.page.argocd
                mountPoints:
                  - mountPoint: entity.page.argocd/cards
                    importName: ArgocdContent
                    config:
                      layout:
                        gridColumn: "1 / -1"

      # ── Tekton ────────────────────────────────────────────────────────────
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-tekton:{{inherit}}
        disabled: false
