---
# Dynamic plugins configuration for Red Hat Developer Hub.
# Uses the default plugin set bundled with the RHDH image.
# Specific plugins will be enabled here once correct package references
# are confirmed for this RHDH version.
apiVersion: v1
kind: ConfigMap
metadata:
  name: dynamic-plugins-rhdh
  namespace: developer-hub
data:
  dynamic-plugins.yaml: |
    includes:
      - dynamic-plugins.default.yaml
    plugins:
      # ── Keycloak catalog sync ──────────────────────────────────────────────
      - package: ./dynamic-plugins/dist/backstage-community-plugin-catalog-backend-module-keycloak-dynamic
        disabled: false

      # ── Kubernetes (required by Tekton) ───────────────────────────────────
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes-backend-dynamic
        disabled: false

      # ── ArgoCD ────────────────────────────────────────────────────────────
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-argocd-backend:bs_1.49.4__1.4.0
        disabled: false
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-argocd:bs_1.49.4__2.8.0
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-argocd:
                translationResources:
                  - importName: argocdTranslations
                    module: Alpha
                    ref: argocdTranslationRef
                mountPoints:
                  - mountPoint: entity.page.overview/cards
                    importName: ArgocdDeploymentSummary
                    config:
                      layout:
                        gridColumnEnd:
                          lg: span 8
                          xs: span 12
                      if:
                        allOf:
                          - isArgocdConfigured
                  - mountPoint: entity.page.cd/cards
                    importName: ArgocdDeploymentLifecycle
                    config:
                      layout:
                        gridColumn: 1 / -1
                      if:
                        allOf:
                          - isArgocdConfigured

      # ── Lightspeed ────────────────────────────────────────────────────────
      - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-lightspeed-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-lightspeed
        disabled: false

      # ── Tekton ────────────────────────────────────────────────────────────
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-tekton:bs_1.49.4__3.37.0
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-tekton:
                translationResources:
                  - importName: tektonTranslations
                    ref: tektonTranslationRef
                mountPoints:
                  - mountPoint: entity.page.ci/cards
                    importName: TektonCI
                    config:
                      layout:
                        gridColumn: 1 / -1
                      if:
                        allOf:
                          - isTektonCIAvailable
