---
apiVersion: rhdh.redhat.com/v1alpha5
kind: Backstage
metadata:
  name: developer-hub
  namespace: developer-hub
spec:
  application:
    route:
      enabled: true
    appConfig:
      mountPath: /opt/app-root/src
      configMaps:
        - name: app-config-rhdh
        - name: lightspeed-app-config
    dynamicPluginsConfigMapName: dynamic-plugins-rhdh
    extraEnvs:
      envs:
        - name: NODE_TLS_REJECT_UNAUTHORIZED
          value: "0"
      secrets:
        - name: backstage-secrets          # static sealed: BACKEND_SECRET, SESSION_SECRET, KEYCLOAK_CLIENT_*
      configMaps:
        - name: backstage-cluster-config   # written to git by bootstrap.yml: KEYCLOAK_BASE_URL
    extraFiles:
      configMaps:
        - name: lightspeed-stack
          mountPath: /app-root
          key: lightspeed-stack.yaml
          containers:
            - lightspeed-core
  database:
    enableLocalDb: true
  deployment:
    patch:
      spec:
        template:
          spec:
            volumes:
              - name: rag-data-volume
                emptyDir: {}
            containers:
              - name: llama-stack
                image: 'quay.io/redhat-ai-dev/llama-stack:library-0.5.2'
                # Run as llama-stack server (not LCS) using the built-in config.yaml.
                # config.yaml has server.port=8321 and reads ENABLE_OLLAMA/OLLAMA_URL from env.
                command:
                  - /app-root/.venv/bin/llama
                  - stack
                  - run
                  - /app-root/config.yaml
                envFrom:
                  - secretRef:
                      name: llama-stack-secrets
                volumeMounts:
                  - mountPath: /rag-content
                    name: rag-data-volume
