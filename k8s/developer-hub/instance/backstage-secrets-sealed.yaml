---
# SealedSecret for Developer Hub application secrets.
# Sealed with the shared Sealed Secrets key (same key as devops-ai-agentic).
#
# To (re)generate this file:
#
#   1. Fetch the public cert from the cluster:
#        kubeseal --fetch-cert \
#          --controller-name=sealed-secrets-controller \
#          --controller-namespace=sealed-secrets \
#          > /tmp/sealed-secrets.crt
#
#   2. Create and seal the secret:
#        kubectl create secret generic backstage-secrets \
#          --namespace=developer-hub \
#          --from-literal=BACKEND_SECRET='<random-string>' \
#          --from-literal=GITHUB_TOKEN='ghp_...' \
#          --from-literal=GITHUB_CLIENT_ID='<oauth-app-client-id>' \
#          --from-literal=GITHUB_CLIENT_SECRET='<oauth-app-client-secret>' \
#          --from-literal=ARGOCD_TOKEN='<argocd-api-token>' \
#          --dry-run=client -o yaml | \
#          kubeseal --cert /tmp/sealed-secrets.crt \
#          --format yaml > k8s/developer-hub/instance/backstage-secrets-sealed.yaml
#
# PLACEHOLDER — replace the encryptedData values below with real sealed values.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: backstage-secrets
  namespace: developer-hub
spec:
  encryptedData:
    BACKEND_SECRET: REPLACE_WITH_SEALED_VALUE
    GITHUB_TOKEN: REPLACE_WITH_SEALED_VALUE
    GITHUB_CLIENT_ID: REPLACE_WITH_SEALED_VALUE
    GITHUB_CLIENT_SECRET: REPLACE_WITH_SEALED_VALUE
    ARGOCD_TOKEN: REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      name: backstage-secrets
      namespace: developer-hub
    type: Opaque
