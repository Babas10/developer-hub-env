---
# llama-stack run config used by lightspeed-core in library mode.
# lightspeed-core embeds llama-stack directly (no sidecar server needed).
# Format matches library-0.5.2 distro config; image_name: null = library mode.
apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-stack-run-config
  namespace: developer-hub
data:
  llama-stack-run.yaml: |
    version: 2
    image_name: null
    distro_name: ollama-lightspeed
    providers:
      inference:
        - provider_id: ollama
          provider_type: remote::ollama
          config:
            base_url: http://ollama.ai-agentic.svc:11434
      agents:
        - provider_id: meta-reference
          provider_type: inline::meta-reference
          config: {}
      safety: []
      tool_runtime:
        - provider_id: rag-runtime
          provider_type: inline::rag-runtime
          config: {}
      vector_io: []
    storage:
      backends:
        kv_default:
          db_path: /tmp/kvstore.db
          type: kv_sqlite
        sql_default:
          db_path: /tmp/sql_store.db
          type: sql_sqlite
      stores:
        metadata:
          backend: kv_default
          namespace: registry
        conversations:
          backend: sql_default
          table_name: openai_conversations
        inference:
          backend: sql_default
          table_name: inference_store
          max_write_queue_size: 10000
          num_writers: 4
