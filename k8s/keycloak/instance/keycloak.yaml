---
apiVersion: k8s.keycloak.org/v2beta1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak
spec:
  instances: 1
  db:
    vendor: postgres
    host: keycloak-postgres
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret
      key: password
  http:
    # HTTP enabled for dev — operator creates an edge-terminated route (TLS at router)
    httpEnabled: true
  hostname:
    # strict: false allows the instance to respond to any hostname (ephemeral clusters)
    strict: false
  ingress:
    enabled: true
