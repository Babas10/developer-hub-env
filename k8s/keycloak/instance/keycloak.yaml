---
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: rhdh-keycloak
  namespace: keycloak
spec:
  instances: 1
  additionalOptions:
    # Tell Keycloak it is behind a TLS-terminating proxy (OpenShift edge route).
    # The router forwards X-Forwarded-Proto: https so Keycloak sets secure cookies
    # and determines the correct origin for CORS.
    - name: proxy-headers
      value: xforwarded
  db:
    vendor: postgres
    host: rhdh-keycloak-postgres
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret
      key: password
  http:
    # HTTP enabled for dev — operator creates an edge-terminated route (TLS at router)
    httpEnabled: true
  hostname:
    # strict: false allows the instance to respond to any hostname (ephemeral clusters)
    strict: false
  ingress:
    enabled: false  # Route is managed separately below — ingress.enabled creates a K8s Ingress, not an OCP Route
