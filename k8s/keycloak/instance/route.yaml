---
# OpenShift Route for rhdh-keycloak.
# ingress.enabled on the Keycloak CR creates a K8s Ingress (wrong for OCP),
# so we manage the Route directly here.
# Hostname is auto-generated by OpenShift as: rhdh-keycloak-keycloak.apps.<cluster-domain>
# This matches the KEYCLOAK_BASE_URL written by bootstrap.yml.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: rhdh-keycloak
  namespace: keycloak
spec:
  to:
    kind: Service
    name: rhdh-keycloak-service
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
