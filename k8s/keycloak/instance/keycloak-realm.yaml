---
# KeycloakRealmImport — configures the 'rhdh' realm with the Developer Hub OIDC client.
# The client secret below matches the KEYCLOAK_CLIENT_SECRET sealed in backstage-secrets.
# redirectUris uses a wildcard to support ephemeral clusters with changing domains.
apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: rhdh-realm
  namespace: keycloak
spec:
  keycloakCRName: keycloak
  realm:
    realm: rhdh
    displayName: Developer Hub
    enabled: true
    registrationAllowed: false
    resetPasswordAllowed: true
    rememberMe: true
    clients:
      - clientId: developer-hub
        name: Developer Hub
        description: OIDC client for Red Hat Developer Hub
        enabled: true
        protocol: openid-connect
        publicClient: false
        standardFlowEnabled: true
        implicitFlowEnabled: false
        directAccessGrantsEnabled: false
        clientAuthenticatorType: client-secret
        secret: "72e5eb27f47b902662132592d680e62e55fff5a42d1a056e"
        redirectUris:
          - "https://*"
        webOrigins:
          - "+"
        attributes:
          pkce.code.challenge.method: S256
    roles:
      realm:
        - name: developer-hub-user
          description: Standard Developer Hub user
        - name: developer-hub-admin
          description: Developer Hub administrator
    # Dev users — passwords are plain text here and hashed by Keycloak on import.
    # Acceptable for ephemeral dev clusters. Rotate for any shared/long-lived environment.
    users:
      - username: etienne
        email: etienne@redhat.com
        firstName: Etienne
        lastName: Dubois
        enabled: true
        emailVerified: true
        credentials:
          - type: password
            value: "rhdh-admin-2026"
            temporary: false
        realmRoles:
          - developer-hub-admin

      - username: developer1
        email: developer1@redhat.com
        firstName: Developer
        lastName: One
        enabled: true
        emailVerified: true
        credentials:
          - type: password
            value: "rhdh-dev-2026"
            temporary: false
        realmRoles:
          - developer-hub-user

      - username: developer2
        email: developer2@redhat.com
        firstName: Developer
        lastName: Two
        enabled: true
        emailVerified: true
        credentials:
          - type: password
            value: "rhdh-dev-2026"
            temporary: false
        realmRoles:
          - developer-hub-user
