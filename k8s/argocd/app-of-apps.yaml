---
# App of Apps — Developer Hub environment.
#
# Deploys in sync-wave order:
#   Wave 1: Sealed Secrets controller (Bitnami Helm chart)
#   Wave 2: Developer Hub Operator (Subscription + OperatorGroup)
#   Wave 3: Developer Hub Instance (Backstage CR + configuration)
#
# Apply with:
#   ansible-playbook ansible/playbooks/bootstrap.yml \
#     --vault-password-file ansible/vault_pass \
#     -e ocp_api_url=$OCP_API ...
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/Babas10/developer-hub-env
    targetRevision: main
    path: k8s/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
