---
# Bootstrap playbook — installs OpenShift GitOps operator, pre-creates the
# Sealed Secrets signing key, then hands off to ArgoCD.
#
# Usage — password auth (standard RHDP sandboxes):
#   ansible-playbook ansible/playbooks/bootstrap.yml \
#     --vault-password-file ansible/vault_pass \
#     -e ocp_api_url=$OCP_API \
#     -e ocp_username=$OCP_USER \
#     -e ocp_password=$OCP_PASS
#
# Usage — pre-existing token (when OAuth flow fails):
#   ansible-playbook ansible/playbooks/bootstrap.yml \
#     --vault-password-file ansible/vault_pass \
#     -e ocp_api_url=$OCP_API \
#     -e ocp_token=$(oc whoami --show-token)

- name: Bootstrap OpenShift cluster for Developer Hub
  hosts: localhost
  gather_facts: false

  vars:
    # Override via -e at runtime — never hardcode here
    ocp_api_url: "{{ lookup('env', 'OCP_API') }}"
    ocp_username: "{{ lookup('env', 'OCP_USER') }}"
    ocp_password: "{{ lookup('env', 'OCP_PASS') }}"
    # Optional: pass a pre-existing token to skip the OAuth flow entirely.
    # Get from: oc whoami --show-token
    ocp_token: ""
    # Derive OAuth server URL from API URL
    ocp_oauth_url: "{{ ocp_api_url | regex_replace('https://api\\.(.+?):\\d+$', 'https://oauth-openshift.apps.\\1') }}"

  tasks:
    # -------------------------------------------------------------------------
    # Authenticate — OAuth flow or pre-existing token
    # -------------------------------------------------------------------------
    - name: Request OpenShift OAuth token
      ansible.builtin.uri:
        url: "{{ ocp_oauth_url }}/oauth/authorize?response_type=token&client_id=openshift-challenging-client"
        method: GET
        url_username: "{{ ocp_username }}"
        url_password: "{{ ocp_password }}"
        force_basic_auth: true
        validate_certs: false
        follow_redirects: "none"
        headers:
          X-CSRF-Token: "1"
        status_code: [302]
      register: oauth_response
      when: ocp_token == ""
      tags: always

    - name: Set token from OAuth redirect
      ansible.builtin.set_fact:
        k8s_api_key: "{{ oauth_response.location | regex_search('access_token=([^&]+)', '\\1') | first }}"
      when: ocp_token == ""
      tags: always

    - name: Set token from provided ocp_token
      ansible.builtin.set_fact:
        k8s_api_key: "{{ ocp_token }}"
      when: ocp_token != ""
      tags: always

    # -------------------------------------------------------------------------
    # Install OpenShift GitOps operator (skipped if already present)
    #
    # Some clusters (e.g. RHDP GPU sandboxes) ship with GitOps pre-installed
    # in openshift-operators. The tasks below detect this and skip installation,
    # proceeding directly to the ArgoCD readiness wait.
    # -------------------------------------------------------------------------
    - name: Check if GitOps operator is already installed
      kubernetes.core.k8s_info:
        host: "{{ ocp_api_url }}"
        api_key: "{{ k8s_api_key }}"
        validate_certs: false
        api_version: operators.coreos.com/v1alpha1
        kind: Subscription
        name: openshift-gitops-operator
        namespace: openshift-operators
      register: existing_gitops_sub
      tags: gitops

    - name: Set fact — GitOps already installed
      ansible.builtin.set_fact:
        gitops_already_installed: "{{ existing_gitops_sub.resources | length > 0 }}"
      tags: gitops

    - name: Create operator and operand namespaces
      kubernetes.core.k8s:
        host: "{{ ocp_api_url }}"
        api_key: "{{ k8s_api_key }}"
        validate_certs: false
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ item }}"
      loop:
        - "{{ gitops_operator_namespace }}"
        - "{{ gitops_argocd_namespace }}"
      when: not gitops_already_installed
      tags: gitops

    - name: Create OperatorGroup in openshift-gitops-operator namespace
      kubernetes.core.k8s:
        host: "{{ ocp_api_url }}"
        api_key: "{{ k8s_api_key }}"
        validate_certs: false
        state: present
        definition:
          apiVersion: operators.coreos.com/v1
          kind: OperatorGroup
          metadata:
            name: openshift-gitops-operator
            namespace: "{{ gitops_operator_namespace }}"
      when: not gitops_already_installed
      tags: gitops

    - name: Subscribe to OpenShift GitOps operator
      kubernetes.core.k8s:
        host: "{{ ocp_api_url }}"
        api_key: "{{ k8s_api_key }}"
        validate_certs: false
        state: present
        definition:
          apiVersion: operators.coreos.com/v1alpha1
          kind: Subscription
          metadata:
            name: "{{ gitops_operator_name }}"
            namespace: "{{ gitops_operator_namespace }}"
          spec:
            channel: "{{ gitops_operator_channel }}"
            installPlanApproval: Automatic
            name: "{{ gitops_operator_name }}"
            source: redhat-operators
            sourceNamespace: openshift-marketplace
      when: not gitops_already_installed
      tags: gitops

    - name: Wait for ArgoCD default instance to be ready
      kubernetes.core.k8s_info:
        host: "{{ ocp_api_url }}"
        api_key: "{{ k8s_api_key }}"
        validate_certs: false
        api_version: argoproj.io/v1beta1
        kind: ArgoCD
        name: openshift-gitops
        namespace: "{{ gitops_argocd_namespace }}"
      register: argocd_instance
      until:
        - argocd_instance.resources | length > 0
        - argocd_instance.resources[0].status is defined
        - argocd_instance.resources[0].status.phase is defined
        - argocd_instance.resources[0].status.phase == "Available"
      retries: 30
      delay: 20
      tags: gitops

    # -------------------------------------------------------------------------
    # Grant ArgoCD application controller cluster-admin
    # Required to manage CRDs and cross-namespace resources.
    # Must be done here — ArgoCD cannot apply the binding that grants itself perms.
    # -------------------------------------------------------------------------
    - name: Grant ArgoCD application controller cluster-admin
      kubernetes.core.k8s:
        host: "{{ ocp_api_url }}"
        api_key: "{{ k8s_api_key }}"
        validate_certs: false
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: openshift-gitops-argocd-application-controller-cluster-admin
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cluster-admin
          subjects:
            - kind: ServiceAccount
              name: openshift-gitops-argocd-application-controller
              namespace: "{{ gitops_argocd_namespace }}"
      tags: gitops

    # -------------------------------------------------------------------------
    # Pre-create Sealed Secrets signing key
    # Must happen before ArgoCD deploys the Sealed Secrets controller so it
    # finds the key on first startup and uses it instead of generating a new one.
    # Uses the same key pair as devops-ai-agentic (stored in vault.yml).
    # -------------------------------------------------------------------------
    - name: Create sealed-secrets namespace
      kubernetes.core.k8s:
        host: "{{ ocp_api_url }}"
        api_key: "{{ k8s_api_key }}"
        validate_certs: false
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: sealed-secrets
      tags: sealed-secrets

    - name: Pre-create Sealed Secrets signing key
      kubernetes.core.k8s:
        host: "{{ ocp_api_url }}"
        api_key: "{{ k8s_api_key }}"
        validate_certs: false
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: sealed-secrets-key
            namespace: sealed-secrets
            labels:
              sealedsecrets.bitnami.com/sealed-secrets-key: active
          type: kubernetes.io/tls
          stringData:
            tls.crt: "{{ sealed_secrets_tls_crt }}"
            tls.key: "{{ sealed_secrets_tls_key }}"
      tags: sealed-secrets

    # -------------------------------------------------------------------------
    # Write backstage-cluster-config ConfigMap to git
    # The Keycloak route hostname is deterministic from the cluster API URL:
    #   api.<domain>:6443  →  keycloak-keycloak.apps.<domain>
    # Writing to git before App of Apps means ArgoCD picks it up on first sync.
    # -------------------------------------------------------------------------
    - name: Derive cluster-specific URLs from API URL
      ansible.builtin.set_fact:
        keycloak_base_url: "{{ ocp_api_url | regex_replace('https://api\\.(.+?):\\d+$', 'https://rhdh-keycloak-keycloak.apps.\\1') }}/realms/rhdh"
        argocd_instance1_url: "{{ ocp_api_url | regex_replace('https://api\\.(.+?):\\d+$', 'https://openshift-gitops-server-openshift-gitops.apps.\\1') }}"
        k8s_cluster_name: "{{ ocp_api_url | regex_replace('https://api\\.(.+?):\\d+$', '\\1') }}"
      tags: argocd-apps

    - name: Write backstage-cluster-config ConfigMap
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../../k8s/developer-hub/instance/backstage-cluster-config.yaml"
        content: |
          ---
          # Generated by bootstrap.yml — do not edit manually.
          # Cluster-specific URLs are derived from the cluster API URL at bootstrap time.
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: backstage-cluster-config
            namespace: developer-hub
          data:
            KEYCLOAK_BASE_URL: "{{ keycloak_base_url }}"
            ARGOCD_INSTANCE1_URL: "{{ argocd_instance1_url }}"
            K8S_CLUSTER_URL: "{{ ocp_api_url }}"
            K8S_CLUSTER_NAME: "{{ k8s_cluster_name }}"
      tags: argocd-apps

    - name: Commit and push backstage-cluster-config to git
      ansible.builtin.shell: |
        cd "{{ playbook_dir }}/../.."
        git add k8s/developer-hub/instance/backstage-cluster-config.yaml
        git diff --cached --quiet && echo "no-change" || git commit -m "chore: set KEYCLOAK_BASE_URL for $(echo '{{ ocp_api_url }}' | sed 's|https://api\.||;s|:[0-9]*||')" && git push
      register: git_push_result
      changed_when: "'no-change' not in git_push_result.stdout"
      tags: argocd-apps

    # -------------------------------------------------------------------------
    # Apply App of Apps — ArgoCD takes over from here
    # kubernetes.core.k8s silently fails to persist Application CRs in some
    # environments; use oc apply directly which reliably creates and keeps them.
    # -------------------------------------------------------------------------
    - name: Apply App of Apps ArgoCD Application
      ansible.builtin.command:
        argv:
          - oc
          - apply
          - --server={{ ocp_api_url }}
          - --token={{ k8s_api_key }}
          - --insecure-skip-tls-verify=true
          - -f
          - "{{ playbook_dir }}/../../k8s/argocd/app-of-apps.yaml"
      changed_when: true
      tags: argocd-apps

    # -------------------------------------------------------------------------
    # Revoke token
    # -------------------------------------------------------------------------
    - name: Revoke OpenShift OAuth token
      ansible.builtin.uri:
        url: "{{ ocp_oauth_url }}/oauth/token/{{ k8s_api_key }}"
        method: DELETE
        validate_certs: false
        headers:
          Authorization: "Bearer {{ k8s_api_key }}"
        status_code: [200, 201, 204, 404]
      when: k8s_api_key is defined and ocp_token == ""
      tags: always
