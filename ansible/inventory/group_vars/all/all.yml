---
# OpenShift GitOps operator settings
#
# Some clusters (e.g. RHDP GPU sandboxes) ship with GitOps pre-installed in
# openshift-operators on channel gitops-1.15. The bootstrap detects this and
# skips operator installation automatically — it only applies the app-of-apps.
#
# On bare clusters, the operator is installed in a dedicated namespace to avoid
# conflicting with the global OperatorGroup already present in openshift-operators.
gitops_operator_namespace: openshift-gitops-operator
gitops_operator_channel: gitops-1.15
gitops_operator_name: openshift-gitops-operator
gitops_argocd_namespace: openshift-gitops

# Repository this cluster points to for ArgoCD App of Apps
gitops_repo_url: https://github.com/Babas10/developer-hub-env
gitops_repo_revision: main
gitops_app_of_apps_path: k8s/argocd
